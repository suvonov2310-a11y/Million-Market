<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Million Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        #splash-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #2563eb, #1d4ed8); display: flex; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s; }
        .splash-logo { font-size: 2.5rem; font-weight: 900; color: white; letter-spacing: 0.1em; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        /* Uzum Market uslubidagi karta dizayni */
        .product-card { transition: all 0.2s; cursor: pointer; display: flex; flex-direction: column; height: 100%; }
        .product-card:active { transform: scale(0.98); }
        .heart-btn { transition: transform 0.2s; } .heart-btn:active { transform: scale(1.3); }
        .liked { color: #ef4444 !important; }
        
        /* Scrollbarlarni yashirish */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #cartOverlay, #productOverlay { backdrop-filter: blur(2px); transition: opacity 0.3s; }
        #cartDrawer { transition: transform 0.3s ease-in-out; }
        .drawer-open { transform: translateX(0) !important; }
        
        /* Toast Notification */
        .toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: fixed; z-index: 1000; left: 50%; bottom: 80px; transform: translateX(-50%); opacity: 0; transition: opacity 0.3s, bottom 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-weight: bold; font-size: 14px;}
        .toast.show { visibility: visible; bottom: 100px; opacity: 1; }
        .toast.success { background-color: #10b981; } .toast.error { background-color: #ef4444; }

        /* Mobil qurilmalarda oxirgi tovar pastki menyu tagida qolib ketmasligi uchun */
        body { padding-bottom: 70px; }
        @media (min-width: 768px) { body { padding-bottom: 0; } }
    </style>
</head>
<body>
    <div id="splash-screen"><div class="splash-logo">MILLION</div></div>
    <div id="toastBox" class="toast">Xabar</div>

    <nav class="bg-white shadow-sm sticky top-0 z-40">
        <div class="bg-gray-100 text-[10px] md:text-xs text-gray-500 py-1 px-4 flex justify-end gap-3 font-medium">
            <button onclick="changeLang('uz')" id="lang-uz" class="hover:text-blue-600 font-bold">UZ</button> | 
            <button onclick="changeLang('ru')" id="lang-ru" class="hover:text-blue-600">RU</button>
        </div>
        
        <div class="container mx-auto px-3 py-2 md:py-3 flex flex-wrap md:flex-nowrap justify-between items-center gap-2 md:gap-4">
            <div class="flex items-center gap-3 w-full md:w-auto md:flex-1">
                <h1 class="text-xl md:text-2xl font-black text-blue-600 cursor-pointer tracking-tight" onclick="location.reload()">MILLION</h1>
                <div class="flex-1">
                    <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Qidirish..." class="w-full border p-2 pl-3 rounded-lg bg-gray-50 text-sm outline-none focus:border-blue-500 focus:bg-white transition">
                </div>
            </div>

            <div class="hidden md:flex items-center gap-4">
                <button onclick="toggleFavoritesMode()" class="text-gray-400 hover:text-red-500 text-2xl relative">❤️ <span id="favCount" class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] rounded-full px-1.5 hidden">0</span></button>
                <button onclick="location.href='/profile.html'" class="text-gray-600 hover:text-blue-600 font-bold flex items-center gap-1 text-sm bg-gray-100 px-3 py-2 rounded-lg transition">👤 <span id="text-profile">Profil</span></button>
                <button onclick="toggleCart()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold flex gap-2 text-sm hover:bg-blue-700 shadow-sm"><span id="text-cart">Savat</span> <span id="cartCount" class="bg-white text-blue-600 rounded-full px-2">0</span></button>
            </div>
        </div>

        <div class="border-t bg-white">
            <div class="container mx-auto px-2 py-2">
                <ul id="categoryList" class="flex gap-2 overflow-x-auto hide-scrollbar whitespace-nowrap px-1">
                    </ul>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-2 md:px-4 py-4">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 md:gap-4" id="productsContainer"></div>
        
        <div class="flex justify-center gap-2 mt-8 mb-4" id="paginationControls"></div>
    </main>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40 flex justify-around items-center py-2 pb-3 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <button onclick="setCategory('Barchasi')" class="flex flex-col items-center gap-1 text-gray-500 hover:text-blue-600 focus:text-blue-600 w-1/4">
            <span class="text-xl leading-none">🏠</span><span class="text-[10px] font-medium" id="m-home">Asosiy</span>
        </button>
        <button onclick="toggleFavoritesMode()" class="flex flex-col items-center gap-1 text-gray-500 hover:text-blue-600 focus:text-blue-600 relative w-1/4">
            <span class="text-xl leading-none">❤️</span>
            <span id="mobileFavCount" class="absolute top-0 right-3 bg-red-500 text-white text-[9px] rounded-full px-1.5 hidden border border-white">0</span>
            <span class="text-[10px] font-medium" id="m-fav">Saralangan</span>
        </button>
        <button onclick="toggleCart()" class="flex flex-col items-center gap-1 text-gray-500 hover:text-blue-600 focus:text-blue-600 relative w-1/4">
            <span class="text-xl leading-none">🛒</span>
            <span id="mobileCartCount" class="absolute top-0 right-3 bg-blue-600 text-white text-[9px] rounded-full px-1.5 hidden border border-white">0</span>
            <span class="text-[10px] font-medium" id="m-cart">Savat</span>
        </button>
        <button onclick="location.href='/profile.html'" class="flex flex-col items-center gap-1 text-gray-500 hover:text-blue-600 focus:text-blue-600 w-1/4">
            <span class="text-xl leading-none">👤</span><span class="text-[10px] font-medium" id="m-prof">Profil</span>
        </button>
    </div>

    <div id="productOverlay" class="fixed inset-0 bg-black bg-opacity-70 z-50 hidden opacity-0 transition-opacity flex items-end md:items-center justify-center md:p-4" onclick="if(event.target === this) closeProductModal()">
        <div id="productModal" class="bg-white w-full md:max-w-4xl rounded-t-2xl md:rounded-2xl shadow-2xl flex flex-col md:flex-row overflow-hidden max-h-[90vh] md:max-h-[85vh] transform translate-y-full md:translate-y-0 md:scale-95 transition-all duration-300 relative">
            
            <div class="w-full flex justify-center py-2 md:hidden" onclick="closeProductModal()">
                <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
            </div>

            <button onclick="closeProductModal()" class="hidden md:flex absolute top-3 right-4 text-gray-400 hover:text-red-500 text-3xl font-bold z-10 bg-white rounded-full w-8 h-8 items-center justify-center shadow">&times;</button>
            
            <div class="w-full md:w-1/2 bg-gray-50 flex items-center justify-center relative">
                <img id="detailImg" src="" class="w-full h-56 md:h-full object-contain p-4 mix-blend-multiply">
                <button id="detailFavBtn" class="absolute top-2 right-2 w-10 h-10 bg-white rounded-full flex items-center justify-center text-xl shadow-md">❤️</button>
            </div>
            
            <div class="w-full md:w-1/2 flex flex-col h-full bg-white">
                <div class="p-4 md:p-6 overflow-y-auto flex-1 hide-scrollbar">
                    <span id="detailCat" class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded mb-2 inline-block uppercase tracking-wider border border-blue-100"></span>
                    <h2 id="detailName" class="text-lg md:text-2xl font-bold text-gray-900 mb-2 leading-snug"></h2>
                    <div class="flex items-center gap-3 mb-4">
                        <p id="detailPrice" class="text-2xl md:text-3xl font-black text-blue-600"></p>
                        <p id="detailOldPrice" class="text-sm md:text-lg line-through text-gray-400"></p>
                    </div>
                    <p id="detailDesc" class="text-xs md:text-sm text-gray-600 mb-6 leading-relaxed border-b pb-4"></p>
                    
                    <div>
                        <h3 class="font-bold text-gray-800 mb-3 text-sm md:text-lg" id="text-reviews">💬 Sharhlar (<span id="reviewCount">0</span>)</h3>
                        <div id="reviewsList" class="space-y-3 mb-4 max-h-40 overflow-y-auto pr-1 hide-scrollbar"></div>
                        <div class="flex gap-2 mt-2">
                            <input type="text" id="reviewInput" placeholder="Fikringizni yozing..." class="flex-1 border p-2 md:p-3 rounded-xl text-xs bg-gray-50 outline-none focus:border-blue-500 transition">
                            <button id="submitReviewBtn" class="bg-blue-600 text-white px-4 font-bold rounded-xl text-xs shadow-md">Yuborish</button>
                        </div>
                    </div>
                </div>
                
                <div class="p-4 border-t bg-white">
                    <button id="detailAddBtn" class="w-full bg-yellow-400 hover:bg-yellow-500 active:scale-95 font-bold py-3.5 rounded-xl text-yellow-900 shadow-md transition transform text-sm">Savatga qo'shish</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cartOverlay" class="fixed inset-0 bg-black bg-opacity-60 z-50 hidden opacity-0 transition-opacity" onclick="toggleCart()"></div>
    <div id="cartDrawer" class="fixed top-0 right-0 w-full md:w-[450px] h-full bg-white shadow-2xl z-[60] transform translate-x-full flex flex-col transition-transform duration-300">
        <div class="bg-white p-4 md:p-5 border-b flex justify-between items-center shadow-sm z-10">
            <h2 class="text-lg md:text-xl font-bold" id="text-cart-title">🛒 Savatcha</h2>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-red-500 text-3xl leading-none">&times;</button>
        </div>
        
        <div id="cartItems" class="flex-1 overflow-y-auto p-4 md:p-5 divide-y hide-scrollbar"></div>
        
        <div class="bg-gray-50 p-4 md:p-5 border-t shadow-[0_-4px_10px_rgba(0,0,0,0.03)] pb-8 md:pb-5">
            <div class="bg-blue-50 border border-blue-100 p-3 md:p-4 rounded-xl mb-4 text-blue-900">
                <p class="text-sm md:text-base font-bold flex justify-between"><span id="text-total">Jami:</span> <span id="cartTotal" class="text-lg md:text-xl font-black text-blue-700">0 s</span></p>
            </div>
            
            <div class="mb-4">
                <div class="flex gap-2 md:gap-4 bg-white p-2 md:p-3 rounded-xl border">
                    <label class="flex-1 flex items-center justify-center gap-2 text-xs md:text-sm border border-transparent rounded-lg p-2 cursor-pointer hover:bg-gray-50 has-[:checked]:bg-blue-50 has-[:checked]:border-blue-200 transition">
                        <input type="radio" name="deliveryType" value="delivery" checked onchange="toggleDeliveryMode()" class="hidden">
                        <span id="text-del" class="font-bold text-gray-700">🚚 Yetkazish</span>
                    </label>
                    <label class="flex-1 flex items-center justify-center gap-2 text-xs md:text-sm border border-transparent rounded-lg p-2 cursor-pointer hover:bg-gray-50 has-[:checked]:bg-purple-50 has-[:checked]:border-purple-200 transition">
                        <input type="radio" name="deliveryType" value="pickup" onchange="toggleDeliveryMode()" class="hidden">
                        <span id="text-pick" class="font-bold text-gray-700">🏃‍♂️ Olib ketish</span>
                    </label>
                </div>
            </div>
            
            <div class="space-y-2 mb-4">
                <input type="text" id="userName" placeholder="Ism sharifingiz" class="w-full border border-gray-200 p-3 rounded-xl text-sm bg-white outline-none focus:border-blue-500">
                <input type="text" id="userPhone" placeholder="+998 90 123 45 67" class="w-full border border-gray-200 p-3 rounded-xl text-sm bg-white outline-none focus:border-blue-500">
                <input type="text" id="userLocation" placeholder="Manzil (Shahar, tuman...)" class="w-full border border-gray-200 p-3 rounded-xl text-sm bg-white outline-none focus:border-blue-500">
            </div>
            
            <button onclick="sendOrder()" id="orderBtn" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-3.5 rounded-xl transition transform shadow-md shadow-blue-200">Tasdiqlash</button>
        </div>
    </div>

    <div id="liveChatWidget" class="fixed bottom-20 md:bottom-6 right-4 md:right-6 z-40 flex flex-col items-end">
        <div id="chatBox" class="hidden bg-white w-[calc(100vw-32px)] md:w-80 h-[350px] md:h-[400px] rounded-2xl shadow-2xl border flex flex-col mb-4 overflow-hidden origin-bottom-right transition-all">
            <div class="bg-blue-600 text-white p-3 md:p-4 font-bold flex justify-between items-center z-10 shadow-md">
                <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-400 animate-pulse border border-white"></span><span class="text-sm">Jonli chat</span></div>
                <button onclick="toggleLiveChat()" class="text-white text-2xl leading-none hover:text-gray-200">&times;</button>
            </div>
            <div id="chatMessages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3 text-xs md:text-sm bg-gray-50 hide-scrollbar">
                <div class="bg-blue-100 text-blue-900 self-start px-4 py-2 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm border border-blue-200">Assalomu alaykum! Savollaringiz bormi?</div>
            </div>
            <div class="p-3 border-t bg-white flex gap-2">
                <input type="text" id="chatInput" placeholder="Yozing..." class="flex-1 border border-gray-200 bg-gray-50 rounded-full px-4 py-2 outline-none text-xs focus:border-blue-500 transition" onkeypress="if(event.key === 'Enter') sendChatMessage()">
                <button onclick="sendChatMessage()" class="bg-blue-600 text-white w-9 h-9 rounded-full flex justify-center items-center shadow-md active:scale-90 transition">➤</button>
            </div>
        </div>
        <button onclick="toggleLiveChat()" class="bg-blue-600 text-white w-12 h-12 md:w-14 md:h-14 rounded-full shadow-lg shadow-blue-300 flex justify-center items-center text-xl md:text-2xl hover:scale-110 active:scale-95 transition-transform border-2 border-white">💬</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Tarjimalar lug'ati
        const dict = { 
            uz: { search: "Qidirish...", profile: "Profil", cart: "Savat", all: "Barchasi", empty: "Hech narsa topilmadi", addBtn: "Savatga", out: "Qolmagan", added: "Qo'shildi", cTitle: "🛒 Savatcha", tot: "Jami:", d1: "🚚 Yetkazish", d2: "🏃‍♂️ Olib ketish", nameP: "Ism sharifingiz", locP: "Manzil (Shahar, tuman...)", oBtn: "Tasdiqlash", rTitle: "💬 Sharhlar", rPl: "Fikringizni yozing...", rBtn: "Yuborish", adminReply: "Do'kon javobi:", mHome: "Asosiy", mFav: "Saralangan", mCart: "Savat", mProf: "Profil" }, 
            ru: { search: "Поиск...", profile: "Профиль", cart: "Корзина", all: "Все", empty: "Не найдено", addBtn: "В корзину", out: "Нет в наличии", added: "Добавлено", cTitle: "🛒 Корзина", tot: "Итого:", d1: "🚚 Доставка", d2: "🏃‍♂️ Самовывоз", nameP: "Ваше имя", locP: "Адрес (Район...)", oBtn: "Оформить", rTitle: "💬 Отзывы", rPl: "Ваш отзыв...", rBtn: "Отправить", adminReply: "Ответ магазина:", mHome: "Главная", mFav: "Избранное", mCart: "Корзина", mProf: "Профиль" } 
        };
        let lang = localStorage.getItem('siteLang') || 'uz'; 
        
        let products = [], categoriesData = [], cart = [], favorites = JSON.parse(localStorage.getItem('favs')) || [];
        let currentCategory = 'Barchasi', showOnlyFavorites = false, currentPage = 1, itemsPerPage = 8, filteredProducts = [];
        let userName = localStorage.getItem('userName'), userPhoneNum = localStorage.getItem('userPhoneNum');

        window.onload = () => { applyLangUI(); setTimeout(() => { document.getElementById('splash-screen').style.opacity = '0'; setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 300); initData(); if(userName) document.getElementById('text-profile').innerText = userName; }, 1000); };

        function showToast(msg, type = 'success') {
            const box = document.getElementById('toastBox'); box.innerText = msg;
            box.className = `toast show ${type}`;
            setTimeout(() => box.className = 'toast', 2500);
        }

        function changeLang(l) { lang = l; localStorage.setItem('siteLang', l); applyLangUI(); renderCategories(); applyFilters(); renderCartItems(); }
        function applyLangUI() {
            const d = dict[lang];
            document.getElementById('lang-uz').className = lang === 'uz' ? 'text-blue-600 font-bold' : 'hover:text-blue-600';
            document.getElementById('lang-ru').className = lang === 'ru' ? 'text-blue-600 font-bold' : 'hover:text-blue-600';
            document.getElementById('searchInput').placeholder = d.search; 
            document.getElementById('text-profile').innerText = userName || d.profile;
            document.getElementById('text-cart').innerText = d.cart; 
            document.getElementById('text-cart-title').innerText = d.cTitle; 
            document.getElementById('text-total').innerText = d.tot;
            document.getElementById('text-del').innerText = d.d1; 
            document.getElementById('text-pick').innerText = d.d2;
            document.getElementById('userName').placeholder = d.nameP; 
            document.getElementById('userLocation').placeholder = d.locP;
            document.getElementById('orderBtn').innerText = d.oBtn; 
            document.getElementById('reviewInput').placeholder = d.rPl; 
            document.getElementById('submitReviewBtn').innerText = d.rBtn;
            
            // Mobil menu tarjimalari
            document.getElementById('m-home').innerText = d.mHome;
            document.getElementById('m-fav').innerText = d.mFav;
            document.getElementById('m-cart').innerText = d.mCart;
            document.getElementById('m-prof').innerText = d.mProf;
        }

        async function initData() { 
            try {
                categoriesData = await (await fetch('/api/categories')).json(); 
                products = await (await fetch('/api/products')).json(); 
                renderCategories(); updateFavUI(); applyFilters(); 
            } catch(e) { showToast("Tarmoq xatosi", "error"); }
        }

        function renderCategories() {
            const catList = document.getElementById('categoryList');
            catList.innerHTML = `<button onclick="setCategory('Barchasi')" class="px-4 py-2 rounded-xl text-xs md:text-sm font-medium transition ${currentCategory === 'Barchasi' ? 'bg-gray-900 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">${dict[lang].all}</button>`;
            categoriesData.forEach(c => catList.innerHTML += `<button onclick="setCategory('${c.name}')" class="px-4 py-2 rounded-xl text-xs md:text-sm font-medium transition ${currentCategory === c.name ? 'bg-gray-900 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}">${c.name}</button>`);
        }

        function setCategory(cat) { currentCategory = cat; showOnlyFavorites = false; currentPage = 1; renderCategories(); applyFilters(); }
        function toggleFavoritesMode() { showOnlyFavorites = !showOnlyFavorites; currentCategory = 'Barchasi'; currentPage = 1; renderCategories(); applyFilters(); }

        // Mobil menu uchun maxsus funksiya
        function changeMobileTab(tab) {
            if(tab === 'home') { showOnlyFavorites = false; currentCategory = 'Barchasi'; currentPage = 1; renderCategories(); applyFilters(); window.scrollTo(0,0); }
        }

        function applyFilters() {
            filteredProducts = products;
            if (showOnlyFavorites) filteredProducts = filteredProducts.filter(p => favorites.includes(p._id));
            else if (currentCategory !== 'Barchasi') filteredProducts = filteredProducts.filter(p => p.category === currentCategory);
            const search = document.getElementById('searchInput').value.toLowerCase();
            if (search) filteredProducts = filteredProducts.filter(p => p.name.toLowerCase().includes(search));
            renderPaginated();
        }

        function renderPaginated() {
            const start = (currentPage - 1) * itemsPerPage; const paginatedItems = filteredProducts.slice(start, start + itemsPerPage);
            const container = document.getElementById('productsContainer');
            if(paginatedItems.length === 0) return container.innerHTML = `<div class="col-span-full text-center py-12 flex flex-col items-center"><span class="text-4xl mb-2">🔍</span><p class="text-gray-500 font-bold">${dict[lang].empty}</p></div>`;
            
            container.innerHTML = paginatedItems.map(p => `
                <div class="product-card bg-white rounded-xl overflow-hidden border border-gray-100 shadow-sm relative" onclick="openProductModal('${p._id}')">
                    <button onclick="event.stopPropagation(); toggleFav('${p._id}', this)" class="heart-btn absolute top-2 right-2 text-xl md:text-2xl text-gray-300 z-10 drop-shadow-md ${favorites.includes(p._id) ? 'liked' : ''}">❤️</button>
                    <div class="bg-gray-50 h-36 md:h-48 w-full flex items-center justify-center p-2"><img src="${p.img}" class="max-w-full max-h-full object-contain mix-blend-multiply"></div>
                    <div class="p-2 md:p-4 flex-1 flex flex-col justify-between bg-white">
                        <div>
                            <h3 class="text-[11px] md:text-sm text-gray-800 font-medium line-clamp-2 leading-tight mb-1 md:mb-2">${p.name}</h3>
                            <p class="text-sm md:text-lg font-black text-gray-900 tracking-tight">${p.oldPrice ? `<span class="text-[10px] md:text-xs text-gray-400 line-through font-normal block md:inline">${p.oldPrice}</span>` : ''} ${p.price.toLocaleString()} s</p>
                        </div>
                        <div class="mt-2 md:mt-3">
                            ${p.inStock === false ? `<button onclick="event.stopPropagation()" disabled class="w-full bg-gray-100 text-gray-400 font-bold py-1.5 md:py-2 rounded-lg text-[10px] md:text-xs cursor-not-allowed">${dict[lang].out}</button>` : `<button onclick="event.stopPropagation(); addToCart('${p._id}', this)" class="w-full bg-yellow-400 active:bg-yellow-500 font-bold py-1.5 md:py-2 rounded-lg text-[10px] md:text-xs text-yellow-900 transition-colors shadow-sm">${dict[lang].addBtn}</button>`}
                        </div>
                    </div>
                </div>`).join('');
            
            const totalPages = Math.ceil(filteredProducts.length / itemsPerPage); let html = '';
            for(let i=1; i<=totalPages; i++) html += `<button onclick="currentPage=${i}; applyFilters(); window.scrollTo(0,0);" class="w-8 h-8 md:w-10 md:h-10 rounded-lg border font-bold text-xs md:text-sm flex justify-center items-center transition ${i === currentPage ? 'bg-gray-900 text-white border-gray-900 shadow-md' : 'bg-white text-gray-600 hover:bg-gray-50'}">${i}</button>`;
            document.getElementById('paginationControls').innerHTML = totalPages > 1 ? html : '';
        }

        // --- MAHSULOT MODALI ---
        function openProductModal(id) {
            const p = products.find(x => x._id === id); if(!p) return;
            document.getElementById('detailImg').src = p.img; document.getElementById('detailName').innerText = p.name; document.getElementById('detailCat').innerText = p.category;
            document.getElementById('detailPrice').innerText = p.price.toLocaleString() + " s"; document.getElementById('detailOldPrice').innerText = p.oldPrice ? p.oldPrice.toLocaleString() + " s" : "";
            document.getElementById('detailDesc').innerText = p.description || "";
            
            const addBtn = document.getElementById('detailAddBtn');
            if(p.inStock === false) { addBtn.innerText = dict[lang].out; addBtn.className = "w-full bg-gray-200 text-gray-500 font-bold py-3.5 rounded-xl cursor-not-allowed text-sm"; addBtn.onclick = null; } 
            else { addBtn.innerText = dict[lang].addBtn; addBtn.className = "w-full bg-yellow-400 active:bg-yellow-500 font-bold py-3.5 rounded-xl text-yellow-900 shadow-md transition transform active:scale-95 text-sm"; addBtn.onclick = () => addToCart(p._id, addBtn); }

            const favBtn = document.getElementById('detailFavBtn');
            favBtn.className = `absolute top-3 right-3 w-10 h-10 bg-white rounded-full flex items-center justify-center text-xl shadow-md transition-transform active:scale-125 ${favorites.includes(p._id) ? 'text-red-500' : 'text-gray-300'}`;
            favBtn.onclick = () => { toggleFav(p._id, null); favBtn.className = `absolute top-3 right-3 w-10 h-10 bg-white rounded-full flex items-center justify-center text-xl shadow-md transition-transform active:scale-125 ${favorites.includes(p._id) ? 'text-red-500' : 'text-gray-300'}`; applyFilters(); };

            renderReviews(p); document.getElementById('submitReviewBtn').onclick = () => submitReview(p._id);
            const overlay = document.getElementById('productOverlay'), modal = document.getElementById('productModal');
            overlay.classList.remove('hidden'); 
            setTimeout(() => { 
                overlay.style.opacity = '1'; 
                modal.classList.remove('translate-y-full', 'scale-95'); 
            }, 10);
        }

        function closeProductModal() { 
            const overlay = document.getElementById('productOverlay'), modal = document.getElementById('productModal'); 
            overlay.style.opacity = '0'; 
            if(window.innerWidth < 768) { modal.classList.add('translate-y-full'); } else { modal.classList.add('scale-95'); }
            setTimeout(() => overlay.classList.add('hidden'), 300); 
        }
        
        function renderReviews(product) {
            const list = document.getElementById('reviewsList'); document.getElementById('reviewCount').innerText = product.reviews ? product.reviews.length : 0;
            document.getElementById('text-reviews').innerHTML = `💬 ${dict[lang].rTitle.split(' ')[1]} (<span id="reviewCount">${product.reviews ? product.reviews.length : 0}</span>)`;
            if(!product.reviews || product.reviews.length === 0) { list.innerHTML = `<p class='text-xs text-gray-400'>${dict[lang].empty}</p>`; return; }
            
            list.innerHTML = product.reviews.map(r => `
                <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 mb-2">
                    <p class="text-[10px] md:text-xs font-bold text-gray-800 mb-1">${r.author} <span class="text-gray-400 font-normal ml-2">${new Date(r.date).toLocaleDateString()}</span></p>
                    <p class="text-xs md:text-sm text-gray-700">${r.text}</p>
                    ${r.adminReply ? `<div class="mt-2 bg-blue-50/50 border-l-2 border-blue-400 pl-2 py-1"><p class="text-[9px] font-bold text-blue-600 uppercase">${dict[lang].adminReply}</p><p class="text-[10px] md:text-xs text-gray-700">${r.adminReply}</p></div>` : ''}
                </div>`).join('');
        }

        async function submitReview(productId) {
            const input = document.getElementById('reviewInput'), text = input.value.trim(); if(!text) return;
            document.getElementById('submitReviewBtn').innerText = "...";
            try {
                const res = await fetch(`/api/products/${productId}/reviews`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ author: userName || (lang==='uz'?'Mijoz':'Клиент'), text: text }) });
                if(res.ok) { const updatedProduct = await res.json(); const index = products.findIndex(p => p._id === productId); if(index !== -1) products[index] = updatedProduct; renderReviews(updatedProduct); input.value = ''; showToast(lang==='uz'?'Sharh yuborildi':'Отзыв отправлен');}
            } catch(e) { showToast('Xatolik!', 'error'); }
            document.getElementById('submitReviewBtn').innerText = dict[lang].rBtn;
        }

        // --- Yoqtirganlar va UI yangilash ---
        function toggleFav(id, btn) { 
            favorites.includes(id) ? favorites = favorites.filter(f => f !== id) : favorites.push(id); 
            localStorage.setItem('favs', JSON.stringify(favorites)); 
            if(btn) btn.classList.toggle('liked'); 
            updateFavUI(); 
        }
        function updateFavUI() { 
            document.getElementById('favCount').innerText = favorites.length; 
            document.getElementById('favCount').style.display = favorites.length > 0 ? 'block' : 'none'; 
            // Mobil badge
            document.getElementById('mobileFavCount').innerText = favorites.length;
            document.getElementById('mobileFavCount').style.display = favorites.length > 0 ? 'block' : 'none';
        }

        // --- SAVAT ---
        function toggleCart() { 
            const drawer = document.getElementById('cartDrawer'), overlay = document.getElementById('cartOverlay'); 
            if(drawer.classList.contains('drawer-open')) { 
                drawer.classList.remove('drawer-open'); overlay.style.opacity = '0'; setTimeout(() => overlay.classList.add('hidden'), 300); 
            } else { 
                renderCartItems(); overlay.classList.remove('hidden'); setTimeout(() => { overlay.style.opacity = '1'; drawer.classList.add('drawer-open'); }, 10); 
            } 
        }
        
        function addToCart(id, btn) { 
            const p = products.find(x => x._id === id), ext = cart.find(c => c._id === id); 
            ext ? ext.quantity += 1 : cart.push({...p, quantity: 1}); 
            updateCartUI();
            if(btn) { const t = btn.innerText; btn.innerText = dict[lang].added; showToast(dict[lang].added); setTimeout(() => btn.innerText = t, 1000); } 
        }
        function decreaseQty(id) { const i = cart.findIndex(c => c._id === id); if (i !== -1) { cart[i].quantity > 1 ? cart[i].quantity -= 1 : cart.splice(i, 1); updateCartUI(); renderCartItems(); } }
        function increaseQty(id) { addToCart(id, null); renderCartItems(); }
        
        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            document.getElementById('mobileCartCount').innerText = cart.length;
            document.getElementById('mobileCartCount').style.display = cart.length > 0 ? 'block' : 'none';
        }

        function renderCartItems() {
            let total = 0;
            document.getElementById('cartItems').innerHTML = cart.map(c => { total += c.price * c.quantity; return `
                <div class="py-4 flex justify-between items-center gap-3">
                    <img src="${c.img}" class="w-14 h-14 object-cover rounded-lg border bg-gray-50 mix-blend-multiply p-1">
                    <div class="flex-1">
                        <span class="font-medium text-xs md:text-sm line-clamp-2">${c.name}</span>
                        <b class="text-blue-600 text-sm block mt-1">${(c.price * c.quantity).toLocaleString()} s</b>
                    </div>
                    <div class="flex items-center border border-gray-200 rounded-lg bg-gray-50 overflow-hidden shadow-sm">
                        <button onclick="decreaseQty('${c._id}')" class="w-8 h-8 flex justify-center items-center border-r hover:bg-gray-100 text-gray-600 font-bold active:bg-gray-200">-</button>
                        <span class="w-8 text-center text-xs md:text-sm font-bold">${c.quantity}</span>
                        <button onclick="increaseQty('${c._id}')" class="w-8 h-8 flex justify-center items-center border-l hover:bg-gray-100 text-gray-600 font-bold active:bg-gray-200">+</button>
                    </div>
                </div>`; 
            }).join('') || `<div class="flex flex-col justify-center items-center h-full text-gray-400 font-bold"><span class="text-4xl mb-2">🛒</span>${dict[lang].empty}</div>`;
            
            document.getElementById('cartTotal').innerText = `${total.toLocaleString()} s`; document.getElementById('cartDrawer').dataset.total = total;
            if(userName) { document.getElementById('userName').value = userName; document.getElementById('userPhone').value = userPhoneNum; }
        }
        function toggleDeliveryMode() { const isPickup = document.querySelector('input[name="deliveryType"]:checked').value === 'pickup', loc = document.getElementById('userLocation'); isPickup ? (loc.style.display = 'none', loc.value = '') : loc.style.display = 'block'; }
        
        async function sendOrder() {
            const method = document.querySelector('input[name="deliveryType"]:checked').value, name = document.getElementById('userName').value, phone = document.getElementById('userPhone').value, location = document.getElementById('userLocation').value, finalTotal = document.getElementById('cartDrawer').dataset.total || 0;
            if(!name || !phone || cart.length === 0) return showToast(lang==='uz'?"Ma'lumotlarni to'ldiring!":"Заполните данные!", 'error');
            document.getElementById('orderBtn').innerText = "...";
            try { 
                await fetch('/api/order', { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': localStorage.getItem('userToken') ? 'Bearer ' + localStorage.getItem('userToken') : ''}, body: JSON.stringify({ cart, fullName: name, phone, location: method === 'delivery' ? location : (lang==='uz'?"O'zi olib ketadi":"Самовывоз"), deliveryMethod: method, totalSum: Number(finalTotal) }) }); 
                showToast(lang==='uz'?"Buyurtma qabul qilindi!":"Заказ принят!"); cart = []; updateCartUI(); toggleCart(); 
            } catch (e) { showToast("Xato!", "error"); }
            document.getElementById('orderBtn').innerText = dict[lang].oBtn;
        }

        // --- CHAT ---
        const socket = io();
        function toggleLiveChat() { document.getElementById('chatBox').classList.toggle('hidden'); }
        function sendChatMessage() {
            const input = document.getElementById('chatInput'); const msg = input.value.trim(); if (!msg) return;
            const msgsDiv = document.getElementById('chatMessages'); msgsDiv.innerHTML += `<div class="bg-blue-600 text-white self-end px-4 py-2 rounded-2xl rounded-tr-none max-w-[85%] shadow-sm">${msg}</div>`; msgsDiv.scrollTop = msgsDiv.scrollHeight;
            socket.emit('clientMessage', { msg: msg, name: userName || (lang==='uz'?'Mehmon':'Гость') }); input.value = '';
        }
        socket.on('receiveAdminMessage', (data) => {
            const msgsDiv = document.getElementById('chatMessages'); msgsDiv.innerHTML += `<div class="bg-white border border-blue-100 text-gray-800 self-start px-4 py-2 rounded-2xl rounded-tl-none max-w-[85%] shadow-sm">${data.msg}</div>`; msgsDiv.scrollTop = msgsDiv.scrollHeight;
            if(document.getElementById('chatBox').classList.contains('hidden')) toggleLiveChat();
        });
    </script>
</body>
</html>
